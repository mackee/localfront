# Dependencies for the spa-hosting example: an S3-compatible object store
# (RustFS) seeded with the build output. localfront itself runs on the host:
#
#   docker compose up -d
#   docker compose run --rm seed
#   localfront serve --template template.yaml \
#     --s3-endpoint http://localhost:9000 \
#     --s3-access-key rustfsadmin --s3-secret-key rustfsadmin
#
# `task verify:spa` automates the whole flow and runs scenario.yaml with runn.
name: localfront-spa-hosting

services:
  rustfs:
    image: ${LOCALFRONT_E2E_S3_IMAGE:-rustfs/rustfs:latest}
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      MINIO_ROOT_USER: rustfsadmin
      MINIO_ROOT_PASSWORD: rustfsadmin
    ports:
      - "9000:9000"

  # One-shot uploader (excluded from `up` by its profile; run explicitly).
  seed:
    image: minio/mc:latest
    profiles: [seed]
    depends_on: [rustfs]
    volumes:
      - ./dist:/assets:ro
    entrypoint:
      - sh
      - -c
      - |
        until mc alias set local http://rustfs:9000 rustfsadmin rustfsadmin && mc ls local >/dev/null 2>&1; do
          echo "waiting for the object store..."; sleep 1;
        done
        mc mb local/spa-assets 2>/dev/null || true
        mc cp --recursive /assets/ local/spa-assets/
        echo "seeded spa-assets"
