# CORS (including preflight) and security headers via a managed response
# headers policy, in front of an HTTP API.
#
#   localfront serve --template examples/cors-security/template.yaml
#
# The behavior allows OPTIONS so preflight requests reach the origin and come
# back with the policy's Access-Control-* headers; every response also gets
# HSTS, X-Content-Type-Options, X-Frame-Options, and a referrer policy.
Resources:
  ApiDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Aliases:
          - api.example.test
        Origins:
          - Id: api
            DomainName: 127.0.0.1
            CustomOriginConfig:
              HTTPPort: 3000
              OriginProtocolPolicy: http-only
        DefaultCacheBehavior:
          TargetOriginId: api
          ViewerProtocolPolicy: allow-all
          AllowedMethods: [ GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE ]
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad   # CachingDisabled
          OriginRequestPolicyId: 88a5eaf4-2fd4-4709-b370-b4c650ea3fcf  # CORS-S3Origin (forwards Origin etc.)
          # Managed-CORS-with-preflight-and-SecurityHeadersPolicy
          ResponseHeadersPolicyId: eaab4381-ed33-4a86-88ca-d9558dc6cd63
